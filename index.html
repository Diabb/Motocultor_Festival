<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="description" content="Line-up officielle du Motocultor Festival 2026">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Motocultor 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --card:     #242424;
      --border:   #333333;
      --teal:     #1a9e8f;
      --teal-dim: #0d6b60;
      --rust:     #c4561a;
      --rust-dim: #8a3a10;
      --cream:    #e8e4dc;
      --muted:    #888888;
      --danger:   #e53935;
      --font-display: 'Oswald', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-body);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--cream);
      text-transform: uppercase;
    }
    .logo span { color: var(--teal); }
    .header-actions { display: flex; gap: .5rem; }
    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      transition: color .2s, background .2s;
    }
    .icon-btn:hover, .icon-btn.active { color: var(--teal); background: rgba(26,158,143,.1); }
    .icon-btn svg { width: 22px; height: 22px; }

    /* ── SEARCH ── */
    .search-wrap {
      padding: .5rem 0 .75rem;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: .9rem;
      padding: .55rem .75rem .55rem 2.5rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--teal); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: .7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-wrap.hidden { display: none; }

    /* ── TABS (jours) ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1;
      min-width: 80px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .75rem .5rem;
      cursor: pointer;
      position: relative;
      transition: color .2s;
      white-space: nowrap;
    }
    .tab.active { color: var(--teal); }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--teal);
    }

    /* ── STAGE FILTER ── */
    .stage-filter {
      display: flex;
      gap: .5rem;
      padding: .75rem 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--bg);
    }
    .stage-filter::-webkit-scrollbar { display: none; }
    .stage-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 600;
      font-family: var(--font-display);
      letter-spacing: .04em;
      padding: .35rem .9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }
    .stage-chip.active, .stage-chip:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: rgba(26,158,143,.1);
    }
    .stage-chip[data-stage="Dave Mustage"].active     { border-color: #f97316; color: #f97316; background: rgba(249,115,22,.1); }
    .stage-chip[data-stage="Supositor Stage"].active  { border-color: var(--teal); color: var(--teal); background: rgba(26,158,143,.1); }
    .stage-chip[data-stage="Massey Ferguscène"].active { border-color: #7c4dff; color: #7c4dff; background: rgba(124,77,255,.1); }
    .stage-chip[data-stage="Bruce Dickinscène"].active { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,.1); }

    /* ── MAIN ── */
    main { flex: 1; padding: .5rem 0 5rem; }
    .day-panel { display: none; }
    .day-panel.active { display: block; }

    /* ── SET CARD ── */
    .set-card {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .set-card:hover { background: var(--surface); }
    .set-card.is-fav { background: rgba(26,158,143,.05); }
    .set-card.is-fav .crack {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--teal), var(--teal-dim));
    }
    .set-time {
      font-family: var(--font-display);
      font-size: .95rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 52px;
      letter-spacing: .02em;
    }
    .set-info { flex: 1; min-width: 0; }
    .set-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--cream);
    }
    .set-meta {
      display: flex;
      align-items: center;
      gap: .4rem;
      margin-top: .15rem;
    }
    .stage-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stage-label {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 500;
    }
    .genre-tag {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .1rem .4rem;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: .25rem;
      transition: color .2s, transform .15s;
      flex-shrink: 0;
    }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn.active { color: var(--teal); }
    .fav-btn svg { width: 20px; height: 20px; }

    /* ── STAGE COLORS ── */
    .stage-dot.keltia     { background: #f97316; }   /* Dave Mustage */
    .stage-dot.dolmen     { background: #1a9e8f; }   /* Supositor Stage */
    .stage-dot.menhir     { background: #7c4dff; }   /* Massey Ferguscène */
    .stage-dot.souterrain { background: #22c55e; }   /* Bruce Dickinscène */
    .stage-dot.main       { background: var(--teal); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: .4; }
    .empty p { font-size: .9rem; }

    /* ── DETAIL SHEET ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,0,.67,0);
      max-height: 90dvh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: .75rem auto .5rem;
    }
    .sheet-header {
      padding: .5rem 1rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .sheet-stage-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .4rem;
    }
    .sheet-stage-name {
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .sheet-time-badge {
      margin-left: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: .85rem;
      font-weight: 600;
      padding: .2rem .6rem;
      color: var(--cream);
    }
    .sheet-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      line-height: 1.1;
      color: var(--cream);
    }
    .sheet-genre {
      margin-top: .4rem;
      font-size: .82rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .sheet-body {
      padding: 1rem;
    }
    .sheet-desc {
      font-size: .92rem;
      line-height: 1.65;
      color: #b0aca4;
      margin-bottom: 1.25rem;
    }
    .sheet-country {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .75rem;
    }
    .sheet-actions {
      display: flex;
      gap: .75rem;
      padding: 1rem;
      border-top: 1px solid var(--border);
    }
    .btn {
      flex: 1;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: .75rem;
      border: none;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-fav {
      background: rgba(26,158,143,.15);
      border: 1.5px solid var(--teal);
      color: var(--teal);
    }
    .btn-fav.active {
      background: var(--teal);
      color: #fff;
    }
    .btn-close {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-close:hover { border-color: var(--cream); color: var(--cream); }

    /* ── FAV VIEW ── */
    #fav-panel { display: none; padding-bottom: 5rem; }
    #fav-panel.active { display: block; }
    .fav-day-title {
      font-family: var(--font-display);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .75rem 1rem .25rem;
    }

    /* ── BOTTOM NAV ── */
    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .6rem .25rem .75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .2rem;
      font-family: var(--font-display);
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--teal); }
    .fav-badge {
      position: absolute;
      top: 4px; right: calc(50% - 18px);
      background: var(--rust);
      color: #fff;
      font-size: .6rem;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }

    /* ── CONFLICTS ── */
    .conflict-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rust);
      flex-shrink: 0;
    }

    /* ── OFFLINE BANNER ── */
    #offline-banner {
      display: none;
      background: var(--rust-dim);
      color: var(--cream);
      text-align: center;
      font-size: .8rem;
      padding: .4rem;
      font-weight: 500;
    }
    #offline-banner.show { display: block; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (min-width: 640px) {
      .sheet { max-width: 480px; left: 50%; right: auto; transform: translateX(-50%) translateY(100%); }
      .sheet.open { transform: translateX(-50%) translateY(0); }
      .sheet-overlay { backdrop-filter: blur(4px); }
    }

    /* ── EN CE MOMENT ── */
    .now-ticker { display:none; align-items:center; gap:.5rem; padding:.35rem 1rem; background:rgba(26,158,143,.12); border-bottom:1px solid rgba(26,158,143,.25); font-size:.78rem; color:var(--teal); font-weight:600; overflow:hidden; white-space:nowrap; }
    .now-ticker.visible { display:flex; }
    .now-pulse { width:7px; height:7px; border-radius:50%; background:var(--teal); flex-shrink:0; animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    .now-ticker-text { overflow:hidden; text-overflow:ellipsis; }
    .set-card.is-now { background:rgba(26,158,143,.08); }
    .set-card.is-now .set-time { color:var(--teal); }
    .now-tag { font-size:.65rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--teal); border:1px solid var(--teal); border-radius:4px; padding:.1rem .35rem; animation:pulse 1.4s ease-in-out infinite; }

    /* ── VUE GRILLE ── */
    #grid-panel { display:none; overflow-x:auto; padding-bottom:5rem; }
    #grid-panel.active { display:block; }
    .grid-wrap { min-width:680px; padding:.75rem 0 .75rem 1rem; }
    .grid-stages { display:grid; grid-template-columns:52px repeat(4,1fr); gap:2px; margin-bottom:4px; }
    .grid-stage-label { font-family:var(--font-display); font-size:.65rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; text-align:center; padding:.4rem .2rem; border-radius:6px; }
    .grid-timeline { position:relative; }
    .grid-hour-label { position:absolute; left:0; width:48px; font-size:.6rem; color:var(--muted); font-family:var(--font-display); font-weight:600; text-align:right; padding-right:.4rem; transform:translateY(-50%); pointer-events:none; }
    .grid-hour-rule { position:absolute; left:52px; right:1rem; height:1px; background:var(--border); opacity:.4; pointer-events:none; }
    .grid-cols { display:grid; grid-template-columns:52px repeat(4,1fr); gap:2px; position:relative; }
    .grid-stage-col { position:relative; }
    .grid-set { position:absolute; left:2px; right:2px; border-radius:6px; padding:.25rem .35rem; cursor:pointer; overflow:hidden; transition:filter .15s; border-left:3px solid rgba(255,255,255,.15); }
    .grid-set:hover { filter:brightness(1.25); }
    .grid-set-name { font-family:var(--font-display); font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.02em; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .grid-set-time { font-size:.58rem; opacity:.65; margin-top:.1rem; }
    .grid-set.is-fav { border-left-color:var(--teal) !important; }
    .grid-set.is-now { outline:1.5px solid var(--teal); }
    .grid-now-line { position:absolute; left:54px; right:1rem; height:2px; background:var(--teal); z-index:10; pointer-events:none; border-radius:1px; }
    .grid-now-line::before { content:''; position:absolute; left:-5px; top:-3px; width:8px; height:8px; border-radius:50%; background:var(--teal); }

    /* ── PARTAGER ── */
    .share-sheet { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-radius:20px 20px 0 0; z-index:201; transform:translateY(100%); transition:transform .3s cubic-bezier(.32,0,.67,0); padding:0 1rem 2rem; max-height:80dvh; overflow-y:auto; }
    .share-sheet.open { transform:translateY(0); }
    .share-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:1rem 0 .5rem; }
    .share-actions { display:flex; gap:.75rem; margin-top:.75rem; }
    .btn-share { flex:1; border-radius:10px; font-family:var(--font-display); font-size:.9rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; padding:.65rem; border:1.5px solid var(--border); background:var(--card); color:var(--cream); cursor:pointer; transition:all .2s; }
    .btn-share:hover { border-color:var(--teal); color:var(--teal); }
    canvas#share-canvas { display:none; }
    .share-preview-img { width:100%; border-radius:10px; margin:.75rem 0; display:none; }

    /* ── NOTIF BANNER ── */
    #notif-banner { display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:.6rem 1rem; align-items:center; gap:.75rem; font-size:.82rem; }
    #notif-banner.show { display:flex; }
    #notif-banner p { flex:1; color:var(--cream); }
    #notif-allow { background:var(--teal); color:#fff; border:none; border-radius:6px; font-family:var(--font-display); font-size:.8rem; font-weight:600; padding:.35rem .75rem; cursor:pointer; white-space:nowrap; }
    #notif-dismiss { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem; line-height:1; padding:.25rem; }

  </style>
</head>
<body>

<div id="offline-banner">📵 Mode hors ligne — données en cache</div>

<!-- NOTIF BANNER -->
<div id="notif-banner">
  <p>🔔 Activer les rappels 15 min avant tes favoris ?</p>
  <button id="notif-allow">Activer</button>
  <button id="notif-dismiss">✕</button>
</div>

<!-- TICKER EN CE MOMENT -->
<div class="now-ticker" id="now-ticker">
  <span class="now-pulse"></span>
  <span class="now-ticker-text" id="now-ticker-text"></span>
</div>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="logo">Moto<span>cultor</span> <span style="color:var(--muted);font-weight:400;font-size:.9rem">2026</span></div>
    <div class="header-actions">
      <button class="icon-btn" id="search-toggle" title="Rechercher">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="search-wrap hidden" id="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search-input" placeholder="Chercher un groupe…" autocomplete="off" autocorrect="off">
  </div>
</header>

<!-- TABS JOURS (cachés en vue favoris / recherche) -->
<div class="tabs" id="day-tabs">
  <button class="tab active" data-day="thursday">Jeu 13</button>
  <button class="tab" data-day="friday">Ven 14</button>
  <button class="tab" data-day="saturday">Sam 15</button>
  <button class="tab" data-day="sunday">Dim 16</button>
</div>

<!-- FILTRE SCÈNES -->
<div class="stage-filter" id="stage-filter">
  <button class="stage-chip active" data-stage="all">Toutes</button>
  <button class="stage-chip" data-stage="Dave Mustage">Dave Mustage</button>
  <button class="stage-chip" data-stage="Supositor Stage">Supositor</button>
  <button class="stage-chip" data-stage="Massey Ferguscène">Massey F.</button>
  <button class="stage-chip" data-stage="Bruce Dickinscène">Bruce D.</button>
</div>

<!-- CONTENU PRINCIPAL -->
<main id="main-content">
  <div class="day-panel active" id="panel-thursday"></div>
  <div class="day-panel" id="panel-friday"></div>
  <div class="day-panel" id="panel-saturday"></div>
  <div class="day-panel" id="panel-sunday"></div>
  <div id="search-results" style="display:none"></div>
  <div id="fav-panel"></div>
  <div id="grid-panel"></div>
</main>

<!-- SHARE SHEET -->
<div class="sheet-overlay" id="share-overlay"></div>
<div class="share-sheet" id="share-sheet">

//  STATE
// ══════════════════════════════════
let favorites = JSON.parse(localStorage.getItem('moto_favs') || '[]');
let currentDay = 'thursday';
let currentStage = 'all';
let currentView = 'lineup';
let searchActive = false;
let activeSetId = null;

// ══════════════════════════════════
//  HELPERS
// ══════════════════════════════════
function saveState() {
  localStorage.setItem('moto_favs', JSON.stringify(favorites));
}
function isFav(id) { return favorites.includes(id); }
function toggleFav(id) {
  if (isFav(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  saveState();
  updateBadge();
  refreshAll();
}
function updateBadge() {
  const badge = document.getElementById('fav-badge');
  const n = favorites.length;
  badge.textContent = n;
  badge.style.display = n ? 'flex' : 'none';
}
function stageClass(s) {
  if (!s) return 'main';
  if (s === 'Dave Mustage')      return 'keltia';
  if (s === 'Supositor Stage')   return 'dolmen';
  if (s === 'Massey Ferguscène') return 'menhir';
  if (s === 'Bruce Dickinscène') return 'souterrain';
  return 'main';
}
function allSets() {
  return Object.values(LINE_UP).flat();
}
function findSet(id) { return allSets().find(s => s.id === id); }
function hasConflict(set) {
  return favorites.some(fid => {
    if (fid === set.id) return false;
    const f = findSet(fid);
    if (!f) return false;
    const sDay = set.id.split('-')[0];
    const fDay = fid.split('-')[0];
    if (sDay !== fDay) return false;
    const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    const ss = toMin(set.time), se = toMin(set.end);
    const fs = toMin(f.time),   fe = toMin(f.end);
    return ss < fe && se > fs;
  });
}

// ══════════════════════════════════
//  RENDER
// ══════════════════════════════════
function renderSetCard(set) {
  const fav = isFav(set.id);
  const conflict = fav && hasConflict(set);
  const sc = stageClass(set.stage);
  const stageColor = STAGES[set.stage]?.color || '#1a9e8f';
  return `
    <div class="set-card ${fav ? 'is-fav' : ''}" data-id="${set.id}">
      ${fav ? '<div class="crack"></div>' : ''}
      <div class="set-time">${set.time}</div>
      <div class="set-info">
        <div class="set-name">${set.name}</div>
        <div class="set-meta">
          <span class="stage-dot ${sc}"></span>
          <span class="stage-label">${set.stage}</span>
          <span class="genre-tag">${set.genre}</span>
          ${conflict ? '<span class="conflict-dot" title="Conflit avec un autre favori"></span>' : ''}
        </div>
      </div>
      <button class="fav-btn ${fav ? 'active' : ''}" data-id="${set.id}" title="${fav ? 'Retirer des favoris' : 'Ajouter aux favoris'}">
        <svg viewBox="0 0 24 24" fill="${fav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>
    </div>`;
}

function renderDay(day) {
  const sets = LINE_UP[day]
    .filter(s => currentStage === 'all' || s.stage === currentStage)
    .sort((a,b) => a.time.localeCompare(b.time));
  const panel = document.getElementById(`panel-${day}`);
  if (!sets.length) {
    panel.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>Aucun groupe sur cette scène.</p></div>`;
    return;
  }
  panel.innerHTML = sets.map(renderSetCard).join('');
}

function renderFavs() {
  const panel = document.getElementById('fav-panel');
  if (!favorites.length) {
    panel.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><p>Aucun favori pour l'instant.<br>Tape ⭐ sur un groupe pour le sauvegarder.</p></div>`;
    return;
  }
  const dayNames = { thursday:'Jeudi 13', friday:'Vendredi 14', saturday:'Samedi 15', sunday:'Dimanche 16' };
  let html = '';
  for (const [day, name] of Object.entries(dayNames)) {
    const sets = LINE_UP[day].filter(s => isFav(s.id)).sort((a,b) => a.time.localeCompare(b.time));
    if (!sets.length) continue;
    html += `<div class="fav-day-title">${name}</div>` + sets.map(renderSetCard).join('');
  }
  panel.innerHTML = html;
}

function renderSearch(q) {
  const r = document.getElementById('search-results');
  if (!q) { r.style.display = 'none'; return; }
  const results = allSets().filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.genre.toLowerCase().includes(q) ||
    s.stage.toLowerCase().includes(q)
  ).sort((a,b) => a.name.localeCompare(b.name));
  r.style.display = 'block';
  r.innerHTML = results.length
    ? results.map(renderSetCard).join('')
    : `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>Aucun résultat pour « ${q} »</p></div>`;
}

function refreshAll() {
  Object.keys(LINE_UP).forEach(renderDay);
  if (currentView === 'favs') renderFavs();
}

// ══════════════════════════════════
//  DETAIL SHEET
// ══════════════════════════════════
function openSheet(id) {
  const set = findSet(id);
  if (!set) return;
  activeSetId = id;
  const stageColor = STAGES[set.stage]?.color || '#1a9e8f';
  const sc = stageClass(set.stage);
  document.getElementById('sheet-header').innerHTML = `
    <div class="sheet-stage-row">
      <span class="stage-dot ${sc}" style="width:9px;height:9px"></span>
      <span class="sheet-stage-name" style="color:${stageColor}">${set.stage}</span>
      <span class="sheet-time-badge">${set.time} – ${set.end}</span>
    </div>
    <div class="sheet-title">${set.name}</div>
    <div class="sheet-genre">${set.genre}</div>`;
  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-country">${set.country}</div>
    <div class="sheet-desc">${set.desc}</div>`;
  const btn = document.getElementById('sheet-fav-btn');
  updateSheetBtn();
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');
}
function updateSheetBtn() {
  if (!activeSetId) return;
  const btn = document.getElementById('sheet-fav-btn');
  const fav = isFav(activeSetId);
  btn.textContent = fav ? '★ Dans mes favoris' : '☆ Ajouter aux favoris';
  btn.classList.toggle('active', fav);
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  activeSetId = null;
}



// ══════════════════════════════════
//  EVENTS
// ══════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentDay = tab.dataset.day;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${currentDay}`).classList.add('active');
  });
});

document.querySelectorAll('.stage-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    currentStage = chip.dataset.stage;
    document.querySelectorAll('.stage-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    refreshAll();
  });
});

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

document.getElementById('search-toggle').addEventListener('click', () => {
  searchActive = !searchActive;
  document.getElementById('search-wrap').classList.toggle('hidden', !searchActive);
  document.getElementById('search-toggle').classList.toggle('active', searchActive);
  if (searchActive) {
    document.getElementById('search-input').focus();
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('fav-panel').classList.remove('active');
  } else {
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').style.display = 'none';
    if (currentView === 'lineup') document.getElementById(`panel-${currentDay}`).classList.add('active');
    else { renderFavs(); document.getElementById('fav-panel').classList.add('active'); }
  }
});

document.getElementById('search-input').addEventListener('input', e => {
  renderSearch(e.target.value.toLowerCase().trim());
});

document.addEventListener('click', e => {
  const card = e.target.closest('.set-card');
  const favBtn = e.target.closest('.fav-btn');
  if (favBtn) { e.stopPropagation(); toggleFav(favBtn.dataset.id); return; }
  if (card) openSheet(card.dataset.id);
});

document.getElementById('sheet-overlay').addEventListener('click', closeSheet);
document.getElementById('sheet-close-btn').addEventListener('click', closeSheet);
document.getElementById('sheet-fav-btn').addEventListener('click', () => {
  if (!activeSetId) return;
  toggleFav(activeSetId);
  updateSheetBtn();
});

const DAY_DATES = { thursday:'2026-08-13', friday:'2026-08-14', saturday:'2026-08-15', sunday:'2026-08-16' };
function toMinutes(t) {
  const [h,m] = t.split(':').map(Number);
  return h * 60 + m;
}
function getNowMinutes() {
  const now = new Date();
  let mins = now.getHours() * 60 + now.getMinutes();
  // sets après minuit : on traite les heures 0-4 comme 24-28
  return mins;
}
function getTodayDay() {
  const today = new Date().toISOString().slice(0,10);
  return Object.entries(DAY_DATES).find(([,d]) => d === today)?.[0] || null;
}
function getSetsNow() {
  const day = getTodayDay();
  if (!day) return [];
  const now = getNowMinutes();
  return LINE_UP[day].filter(s => {
    let start = toMinutes(s.time);
    let end   = toMinutes(s.end);
    if (end < start) end += 24*60; // après minuit
    if (start > 20*60 && now < 6*60) { // on est après minuit, décaler now
      return (now + 24*60) >= start && (now + 24*60) < end;
    }
    return now >= start && now < end;
  });
}
function updateNow() {
  const playing = getSetsNow();
  // Ticker
  const ticker  = document.getElementById('now-ticker');
  const tickerTxt = document.getElementById('now-ticker-text');
  if (playing.length) {
    tickerTxt.textContent = '🎸 En ce moment : ' + playing.map(s => `${s.name} — ${s.stage}`).join(' · ');
    ticker.classList.add('visible');
  } else {
    ticker.classList.remove('visible');
  }
  // Cards
  document.querySelectorAll('.set-card').forEach(card => {
    const id = card.dataset.id;
    const isNow = playing.some(s => s.id === id);
    card.classList.toggle('is-now', isNow);
    const existing = card.querySelector('.now-tag');
    if (isNow && !existing) {
      const tag = document.createElement('span');
      tag.className = 'now-tag';
      tag.textContent = 'live';
      card.querySelector('.set-meta')?.appendChild(tag);
    } else if (!isNow && existing) {
      existing.remove();
    }
  });
}
setInterval(updateNow, 30000);

// ══════════════════════════════════
//  RAPPELS NOTIFICATIONS
// ══════════════════════════════════
let notifTimers = [];
function clearNotifTimers() {
  notifTimers.forEach(t => clearTimeout(t));
  notifTimers = [];
}
function scheduleReminders() {
  clearNotifTimers();
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  favorites.forEach(fid => {
    const set = findSet(fid);
    if (!set) return;
    const day = Object.entries(DAY_DATES).find(([k]) => fid.startsWith(k));
    if (!day) return;
    const [h,m] = set.time.split(':').map(Number);
    const setDate = new Date(day[1] + 'T' + set.time + ':00');
    const remindAt = new Date(setDate.getTime() - 15 * 60 * 1000);
    const delay = remindAt - now;
    if (delay > 0) {
      const t = setTimeout(() => {
        new Notification(`⚡ Dans 15 min : ${set.name}`, {
          body: `${set.time} — ${set.stage}`,
          icon: 'icon-192.png',
          tag: fid
        });
      }, delay);
      notifTimers.push(t);
    }
  });
}
function askNotifPermission() {
  Notification.requestPermission().then(perm => {
    document.getElementById('notif-banner').classList.remove('show');
    if (perm === 'granted') scheduleReminders();
  });
}
function initNotifBanner() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default' && favorites.length > 0) {
    document.getElementById('notif-banner').classList.add('show');
  }
}
document.getElementById('notif-allow').addEventListener('click', askNotifPermission);
document.getElementById('notif-dismiss').addEventListener('click', () => {
  document.getElementById('notif-banner').classList.remove('show');
});

// ══════════════════════════════════
//  VUE GRILLE
// ══════════════════════════════════
const STAGE_ORDER = ['Dave Mustage','Supositor Stage','Massey Ferguscène','Bruce Dickinscène'];
const PX_PER_MIN = 1.6; // 1.6px par minute
const GRID_START = 11 * 60; // 11h
const GRID_END   = 27 * 60; // 03h (lendemain)

function renderGrid() {
  const panel = document.getElementById('grid-panel');
  const day = currentDay;
  const sets = LINE_UP[day] || [];
  const totalMins = GRID_END - GRID_START;
  const totalH = totalMins * PX_PER_MIN;

  // Stage colors
  const colors = {
    'Dave Mustage':      { bg:'rgba(249,115,22,.18)', border:'#f97316' },
    'Supositor Stage':   { bg:'rgba(26,158,143,.18)', border:'#1a9e8f' },
    'Massey Ferguscène': { bg:'rgba(124,77,255,.18)', border:'#7c4dff' },
    'Bruce Dickinscène': { bg:'rgba(34,197,94,.18)',  border:'#22c55e' },
  };

  // Build hour labels & rules
  let hoursHTML = '';
  let rulesHTML = '';
  for (let h = 11; h <= 27; h++) {
    const label = h < 24 ? `${h}h` : `${h-24}h`;
    const top = (h * 60 - GRID_START) * PX_PER_MIN;
    hoursHTML += `<div class="grid-hour-label" style="top:${top}px">${label}</div>`;
    rulesHTML += `<div class="grid-hour-rule" style="top:${top}px"></div>`;
  }

  // Build stage columns
  let colsHTML = '<div style="position:relative;width:52px;height:'+totalH+'px"></div>';
  STAGE_ORDER.forEach(stage => {
    const stageSets = sets.filter(s => s.stage === stage);
    let setsHTML = '';
    stageSets.forEach(s => {
      let startMin = toMinutes(s.time);
      let endMin   = toMinutes(s.end);
      if (endMin < startMin) endMin += 24*60;
      // normalize to grid
      if (startMin < GRID_START) startMin += 24*60;
      if (endMin < GRID_START)   endMin   += 24*60;
      const top  = (startMin - GRID_START) * PX_PER_MIN;
      const h    = (endMin - startMin) * PX_PER_MIN;
      const fav  = isFav(s.id);
      const isNow = getSetsNow().some(n => n.id === s.id);
      const c = colors[stage] || { bg:'rgba(100,100,100,.2)', border:'#666' };
      setsHTML += `<div class="grid-set${fav?' is-fav':''}${isNow?' is-now':''}" data-id="${s.id}"
        style="top:${top}px;height:${h}px;background:${c.bg};border-left-color:${c.border}">
        <div class="grid-set-name">${s.name}</div>
        <div class="grid-set-time">${s.time}</div>
      </div>`;
    });
    colsHTML += `<div class="grid-stage-col" style="position:relative;height:${totalH}px">${setsHTML}</div>`;
  });

  // Current time line
  const nowDay = getTodayDay();
  let nowLineHTML = '';
  if (nowDay === day) {
    let nowMin = getNowMinutes();
    if (nowMin < GRID_START - 12*60) nowMin += 24*60; // après minuit
    if (nowMin >= GRID_START && nowMin <= GRID_END) {
      const top = (nowMin - GRID_START) * PX_PER_MIN;
      nowLineHTML = `<div class="grid-now-line" style="top:${top}px"></div>`;
    }
  }

  // Stage headers
  let headersHTML = '<div></div>';
  STAGE_ORDER.forEach(stage => {
    const c = colors[stage] || {};
    headersHTML += `<div class="grid-stage-label" style="background:${c.bg||'rgba(100,100,100,.1)'};color:${c.border||'#fff'}">${stage}</div>`;
  });

  panel.innerHTML = `<div class="grid-wrap">
    <div class="grid-stages">${headersHTML}</div>
    <div style="position:relative">
      ${hoursHTML}
      ${rulesHTML}
      ${nowLineHTML}
      <div class="grid-cols">${colsHTML}</div>
    </div>
  </div>`;
}

function openShareSheet() {
  document.getElementById('share-overlay').classList.add('open');
  document.getElementById('share-sheet').classList.add('open');

}
function closeShareSheet() {
  document.getElementById('share-overlay').classList.remove('open');
  document.getElementById('share-sheet').classList.remove('open');
}
function generateShareImage() {
  const canvas = document.getElementById('share-canvas');
  const ctx = canvas.getContext('2d');
  const W = 800, HEADER = 80, ROW = 52, PAD = 20, GAP = 8;
  const days = ['thursday','friday','saturday','sunday'];
  const dayNames = { thursday:'Jeudi 13', friday:'Vendredi 14', saturday:'Samedi 15', sunday:'Dimanche 16' };
  const favsByDay = days.map(d => LINE_UP[d].filter(s => isFav(s.id)).sort((a,b)=>a.time.localeCompare(b.time)));
  const totalRows = favsByDay.reduce((sum, arr) => sum + (arr.length ? arr.length + 1 : 0), 0);
  const H = HEADER + totalRows * (ROW + GAP) + PAD * 2;
  canvas.width = W; canvas.height = Math.max(H, 200);

  // BG
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, W, canvas.height);

  // Header
  ctx.fillStyle = '#1a9e8f';
  ctx.fillRect(0, 0, W, HEADER);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Oswald, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('MOTOCULTOR 2026', PAD, HEADER/2 - 6);
  ctx.font = '14px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.fillText('Mon planning · diabb.github.io/Motocultor_Festival', PAD, HEADER/2 + 14);

  const stageColors = {
    'Dave Mustage':'#f97316','Supositor Stage':'#1a9e8f',
    'Massey Ferguscène':'#7c4dff','Bruce Dickinscène':'#22c55e'
  };

  let y = HEADER + PAD;
  days.forEach((day, di) => {
    const sets = favsByDay[di];
    if (!sets.length) return;
    // Day label
    ctx.fillStyle = '#333';
    ctx.fillRect(PAD, y, W - PAD*2, 28);
    ctx.fillStyle = '#888';
    ctx.font = 'bold 12px Oswald, sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(dayNames[day].toUpperCase(), PAD + 10, y + 14);
    y += 28 + GAP;

    sets.forEach(s => {
      const sc = stageColors[s.stage] || '#888';
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(PAD, y, W - PAD*2, ROW);
      // accent bar
      ctx.fillStyle = sc;
      ctx.fillRect(PAD, y, 4, ROW);
      // time
      ctx.fillStyle = sc;
      ctx.font = 'bold 14px Oswald, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.time, PAD + 14, y + ROW/2 - 7);
      // name
      ctx.fillStyle = '#e8e4dc';
      ctx.font = 'bold 16px Oswald, sans-serif';
      ctx.fillText(s.name.toUpperCase(), PAD + 14, y + ROW/2 + 8);
      // stage
      ctx.fillStyle = sc;
      ctx.font = '11px Inter, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(s.stage, W - PAD - 8, y + ROW/2);
      ctx.textAlign = 'left';
      y += ROW + GAP;
    });
  });

  if (totalRows === 0) {
    ctx.fillStyle = '#888';
    ctx.font = '16px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Ajoute des favoris pour générer ton planning !', W/2, canvas.height/2);
  }

  const img = document.getElementById('share-preview-img');
  img.src = canvas.toDataURL('image/png');
  img.style.display = 'block';
}
function copyPlanningText() {
  const days = ['thursday','friday','saturday','sunday'];
  const dayNames = { thursday:'Jeudi 13/08', friday:'Vendredi 14/08', saturday:'Samedi 15/08', sunday:'Dimanche 16/08' };
  let text = '🤘 Mon planning Motocultor 2026

';
  days.forEach(day => {
    const sets = LINE_UP[day].filter(s => isFav(s.id)).sort((a,b)=>a.time.localeCompare(b.time));
    if (!sets.length) return;
    text += `📅 ${dayNames[day]}
`;
    sets.forEach(s => { text += `  ${s.time} — ${s.name} (${s.stage})
`; });
    text += '
';
  });
  text += 'diabb.github.io/Motocultor_Festival';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy-text');
    btn.textContent = '✅ Copié !';
    setTimeout(() => { btn.textContent = '📋 Copier le texte'; }, 2000);
  });
}

document.getElementById('share-overlay').addEventListener('click', closeShareSheet);
document.getElementById('share-close-btn').addEventListener('click', closeShareSheet);
document.getElementById('btn-generate-img').addEventListener('click', () => {
  generateShareImage();

//  VIEW SWITCHING (mise à jour)

function switchView(view) {
  currentView = view;
  ['lineup','favs','grid'].forEach(v => {
    document.getElementById('nav-'+v)?.classList.toggle('active', v === view);
  });
  document.getElementById('day-tabs').style.display = (view === 'lineup' || view === 'grid') ? 'flex' : 'none';
  document.getElementById('stage-filter').style.display = view === 'lineup' ? 'flex' : 'none';
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('fav-panel').classList.remove('active');
  document.getElementById('grid-panel').classList.remove('active');
  document.getElementById('search-results').style.display = 'none';
  if (view === 'lineup') {
    document.getElementById(`panel-${currentDay}`).classList.add('active');
  } else if (view === 'favs') {
    renderFavs();
    document.getElementById('fav-panel').classList.add('active');
  } else if (view === 'grid') {
    renderGrid();
    document.getElementById('grid-panel').classList.add('active');
  } else if (view === 'share') {
    // stay on current view, just open sheet
    if (currentView !== 'share') currentView = 'lineup';
    openShareSheet();
    return;
  }
}
