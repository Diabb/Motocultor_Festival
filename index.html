<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="description" content="Line-up officielle du Motocultor Festival">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Motocultor Festival</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="offline-banner">📵 Mode hors ligne — données en cache</div>

<div id="notif-banner">
  <p>🔔 Activer les rappels 15 min avant tes favoris ?</p>
  <button id="notif-allow">Activer</button>
  <button id="notif-dismiss" aria-label="Fermer">✕</button>
</div>

<div class="now-ticker" id="now-ticker">
  <span class="now-pulse"></span>
  <span class="now-ticker-text" id="now-ticker-text"></span>
</div>

<header>
  <div class="header-top">
    <div class="logo">
      Moto<span>cultor</span> 
      <select id="year-select" aria-label="Sélectionner l'année">
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="pwa-install-btn" title="Installer l'application" aria-label="Installer l'application">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="icon-btn" id="search-toggle" title="Rechercher" aria-label="Ouvrir la recherche">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="search-wrap hidden" id="search-wrap">
    <svg class="search-icon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search-input" placeholder="Chercher un groupe…" autocomplete="off" autocorrect="off" aria-label="Champ de recherche">
  </div>
</header>

<div class="tabs" id="day-tabs">
  <button class="tab active" data-day="thursday">Jeu 13</button>
  <button class="tab" data-day="friday">Ven 14</button>
  <button class="tab" data-day="saturday">Sam 15</button>
  <button class="tab" data-day="sunday">Dim 16</button>
</div>

<div class="stage-filter" id="stage-filter" role="group" aria-label="Filtrer par scène">
  <button class="stage-chip active" data-stage="all">Toutes</button>
  <button class="stage-chip" data-stage="Dave Mustage">Dave Mustage</button>
  <button class="stage-chip" data-stage="Supositor Stage">Supositor</button>
  <button class="stage-chip" data-stage="Massey Ferguscène">Massey F.</button>
  <button class="stage-chip" data-stage="Bruce Dickinscène">Bruce D.</button>
</div>

<main id="main-content">
  <div class="day-panel active" id="panel-thursday"></div>
  <div class="day-panel" id="panel-friday"></div>
  <div class="day-panel" id="panel-saturday"></div>
  <div class="day-panel" id="panel-sunday"></div>
  <div id="search-results" style="display:none"></div>
  <div id="fav-panel"></div>
  <div id="grid-panel"></div>
</main>

<div class="sheet-overlay" id="share-overlay"></div>
<div class="share-sheet" id="share-sheet" role="dialog" aria-labelledby="share-sheet-title">
  <div class="sheet-handle"></div>
  <div class="share-title" id="share-sheet-title">Mon planning Motocultor 2026</div>
  <img class="share-preview-img" id="share-preview-img" alt="Aperçu du planning généré">
  <div class="share-actions">
    <button class="btn-share" id="btn-generate-img">🖼 Générer l'image</button>
    <button class="btn-share" id="btn-copy-text">📋 Copier le texte</button>
  </div>
  <div class="share-actions" style="margin-top:.5rem">
    <button class="btn btn-close" id="share-close-btn" style="flex:1">Fermer</button>
  </div>
</div>
<canvas id="share-canvas"></canvas>

<nav role="navigation">
  <button class="nav-btn active" id="nav-lineup" data-view="lineup" aria-label="Voir le programme">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    Programme
  </button>
  <button class="nav-btn" id="nav-favs" data-view="favs" style="position:relative" aria-label="Voir mes favoris">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    Favoris
    <span class="fav-badge" id="fav-badge" style="display:none">0</span>
  </button>
  <button class="nav-btn" id="nav-grid" data-view="grid" aria-label="Voir la grille horaire">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    Grille
  </button>
  <button class="nav-btn" id="nav-share" data-view="share" aria-label="Partager mon planning">
    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
    Partager
  </button>
</nav>

<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="sheet" id="detail-sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <div class="sheet-header" id="sheet-header"></div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-actions">
    <button class="btn btn-fav" id="sheet-fav-btn">☆ Ajouter aux favoris</button>
    <button class="btn btn-close" id="sheet-close-btn">Fermer</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
